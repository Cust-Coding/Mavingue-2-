name: Deploy Backend (Render)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-backend.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/**'

jobs:

  build-test:
    name: Build & Test Spring Boot
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api/auth/app

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven (extra performance)
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Rodar testes
        run: mvn test --no-transfer-progress

      - name: Build aplicação
        run: mvn package -DskipTests --no-transfer-progress


  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mavingue-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mavingue-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mavingue-api:latest
          cache-to: type=inline


  deploy-render:
    name: Deploy no Render
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl --fail --show-error --location \
            --retry 3 \
            --retry-delay 5 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

          echo "Deploy no Render iniciado com sucesso!"