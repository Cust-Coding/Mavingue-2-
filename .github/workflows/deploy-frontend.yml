name: Frontend CI/CD (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/software/mavingue/**"
      - ".github/workflows/deploy-frontend.yml"

  pull_request:
    branches: [main]
    paths:
      - "apps/frontend/software/mavingue/**"

env:
  WORKDIR: apps/frontend/software/mavingue
  NODE_VERSION: '24'

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f "pnpm-lock.yaml" ]; then echo "pm=pnpm" >> $GITHUB_OUTPUT; fi
          if [ -f "package-lock.json" ]; then echo "pm=npm" >> $GITHUB_OUTPUT; fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ steps.pm.outputs.pm }}

      - name: Setup pnpm (if needed)
        if: steps.pm.outputs.pm == 'pnpm'
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then pnpm install --frozen-lockfile; fi
          if [ "${{ steps.pm.outputs.pm }}" = "npm" ]; then npm ci; fi

      - name: Run tests
        run: |
          if [ "${{ steps.pm.outputs.pm }}" = "pnpm" ]; then
            if pnpm run --list | grep -q "test"; then pnpm test -- --passWithNoTests; else echo "⚠️ Sem script test, a ignorar."; fi
          fi
          if [ "${{ steps.pm.outputs.pm }}" = "npm" ]; then
            if npm run | grep -q "test"; then npm test -- --watchAll=false --passWithNoTests; else echo "⚠️ Sem script test, a ignorar."; fi
          fi

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Project (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy Preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Frontend\n\n Deploy concluído!\n\n **URL:** ${{ steps.deploy.outputs.preview_url }}`
            })

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel (Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}